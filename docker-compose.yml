services:
  backend:
    build: ./backend
    container_name: day-planner-backend
    ports:
      - "8080:8080"
    environment:
      DB_PATH: /app/data/planner.db
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: day-planner-demo-secret
    volumes:
      - planner_data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: day-planner-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  planner_data:
